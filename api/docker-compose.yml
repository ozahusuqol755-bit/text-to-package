services:
  api:
    build:
      context: .
    container_name: content_factory_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/content_factory
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: content_factory_postgres
    environment:
      POSTGRES_DB: content_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_factory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
