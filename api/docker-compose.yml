services:
  postgres:
    image: postgres:16
    container_name: content_factory_postgres
    environment:
      POSTGRES_DB: content_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_factory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
